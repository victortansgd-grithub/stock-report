name: Daily Stock Report — 06:00 SGT

on:
  schedule:
    # 06:00 SGT = 22:00 UTC (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily stock report + WhatsApp P&L
        env:
          GMAIL_SENDER:           ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:        ${{ secrets.RECIPIENT_EMAIL }}
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          WHATSAPP_RECIPIENT:     ${{ secrets.WHATSAPP_RECIPIENT }}
        run: python send_once.py
